<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Loge tilmelding</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    body { font-family: Arial; padding:20px; max-width:600px; margin:auto; }
    .card { border:1px solid #ddd; padding:15px; border-radius:10px; margin-top:10px; }
    button { padding:10px; border:none; border-radius:8px; cursor:pointer; }
    .hidden { display:none; }
  </style>
</head>

<body>

<h2>Loge tilmelding</h2>

<div id="loginBox" class="card">
  <input id="nameInput" placeholder="Dit fulde navn" />
  <input id="passwordInput" type="password" placeholder="Password" />
  <button id="loginBtn">Log ind</button>
</div>

<div id="app" class="hidden">

  <h3>Logeaftener</h3>
  <div id="events"></div>

  <h3>Min tilmelding</h3>

  <label>
    <input type="checkbox" id="attending" checked />
    Jeg deltager
  </label>

  <label>
    <input type="checkbox" id="wantsFood" checked />
    Jeg ønsker mad
  </label>

  <label>
    <input type="checkbox" id="bringsGuest" />
    Jeg tager en gæst med
  </label>

  <div id="guestFields" class="hidden">
    <input id="guestName" placeholder="Gæstens navn" />
    <label>
      <input type="checkbox" id="guestWantsFood" />
      Gæst ønsker mad
    </label>
  </div>

  <br><br>
  <button id="saveBtn">Gem</button>

</div>

<script type="module" src="app.js"></script>

</body>
</html>
